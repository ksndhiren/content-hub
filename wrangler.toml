# Cloudflare Pages config for Content Hub.
#
# Project lifecycle:
#   - Created via the Cloudflare Pages dashboard (Connect to Git → this repo).
#   - The dashboard injects build settings (build command, output dir) and
#     secrets (OPENAI_API_KEY). This file pins the R2 binding so dev + prod
#     agree on the bucket name.
#
# If you ever switch to CLI-driven deploys (wrangler pages deploy) this file
# is what wrangler reads.

name = "content-hub"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".output/public"

# R2 bucket binding. The bound name is `DATA` and is read by
# src/lib/storage.server.ts via globalThis.DATA / process.env.DATA.
#
# Create the bucket once in the Cloudflare dashboard (R2 → Create bucket →
# name it `content-hub-data`). For per-env buckets use the [[env.production]]
# / [[env.preview]] sections below.
[[r2_buckets]]
binding = "DATA"
bucket_name = "content-hub-data"
preview_bucket_name = "content-hub-data-preview"

# Production overrides — same bucket on prod, separate preview bucket so PR
# previews don't pollute prod data.
[[env.production.r2_buckets]]
binding = "DATA"
bucket_name = "content-hub-data"

[[env.preview.r2_buckets]]
binding = "DATA"
bucket_name = "content-hub-data-preview"
